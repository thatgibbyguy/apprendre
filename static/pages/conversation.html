<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversation — Apprendre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js" defer></script>
  <script type="module" src="../js/app.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <div class="conversation-layout">
    <!-- Mobile-only scenario summary (hidden on desktop) -->
    <div class="scenario-mobile bg-surface">
      <details class="no-margin">
        <summary class="scenario-mobile__summary display-flex items-center gap-sm padding-sm">
          <div class="scenario-sidebar__avatar circle display-flex items-center justify-center">
            <i data-feather="user"></i>
          </div>
          <span id="mobile-scenario-role">Partner</span>
          <span id="mobile-scenario-level" class="level-badge text-xs level-badge--a1">A1</span>
          <a href="dashboard.html" class="btn btn-ghost btn-icon btn-xs scenario-mobile__back" aria-label="Back to dashboard">
            <i data-feather="arrow-left"></i>
          </a>
        </summary>
        <div class="padding-sm border-top">
          <p id="mobile-scenario-desc" class="text-secondary no-margin margin-bottom-sm"></p>
          <div id="mobile-topic-chips" class="topic-chips-container"></div>
        </div>
      </details>
    </div>

    <!-- Two-column body -->
    <div class="conversation-layout__columns">
      <!-- Left: Chat -->
      <main id="main" class="conversation-layout__chat">
        <div class="chat-thread" id="chat-thread" role="log" aria-label="Conversation" aria-live="polite">
          <!-- Messages inserted by JS -->
        </div>

        <!-- Chat Input -->
        <div class="chat-input-area">
          <label for="chat-input" class="sr-only">Type your message in French</label>
          <input type="text" id="chat-input" placeholder="Écrivez en français..." autocomplete="off">
          <button class="btn btn-primary btn-icon" id="send-btn" aria-label="Send message">
            <i data-feather="send"></i>
          </button>
          <button class="btn btn-ghost btn-icon" id="voice-btn" aria-label="Voice input" disabled>
            <i data-feather="mic"></i>
          </button>
        </div>
      </main>

      <!-- Right: Scenario Sidebar (desktop only) -->
      <aside class="scenario-sidebar bg-surface padding-lg text-center" id="scenario-sidebar" aria-label="Scenario details">
        <a href="dashboard.html" class="btn btn-ghost btn-icon btn-sm margin-bottom-sm" aria-label="Back to dashboard">
          <i data-feather="arrow-left"></i>
          <span>Dashboard</span>
        </a>

        <div class="scenario-sidebar__avatar circle display-flex items-center justify-center">
          <i data-feather="user"></i>
        </div>

        <h2 id="sidebar-role" class="text-lg no-margin">Partner</h2>
        <p id="sidebar-desc" class="text-secondary no-margin"></p>

        <div class="display-flex items-center justify-center gap-sm">
          <span id="sidebar-level" class="level-badge text-xs level-badge--a1">A1</span>
          <span id="sidebar-situation" class="text-xs text-secondary"></span>
        </div>

        <div class="margin-top-sm">
          <h3 class="text-xs text-secondary uppercase no-margin margin-bottom-sm">Topic suggestions</h3>
          <div id="sidebar-topic-chips" class="topic-chips-container"></div>
        </div>

        <button class="btn btn-ghost btn-icon btn-sm scenario-sidebar__end" id="end-btn" aria-label="End conversation">
          <i data-feather="x-circle"></i>
          <span>End conversation</span>
        </button>
      </aside>
    </div>

    <!-- Session Summary — shown by JS when conversation ends -->
    <div id="session-summary-area" class="padding" hidden></div>
  </div>
  <script type="module" src="../js/conversation.js"></script>
</body>
</html>
