<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apprendre — Learn French for your life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js" defer></script>
  <script type="module" src="../js/app.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <div class="landing-layout">
    <!-- Minimal header — no nav links until onboarded -->
    <header>
      <nav class="navbar navbar-borderless" aria-label="Site navigation">
        <ul>
          <li>
            <button class="btn btn-ghost btn-icon btn-sm" id="theme-toggle" aria-label="Toggle dark mode">
              <i data-feather="moon"></i>
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <main id="main" class="landing-layout__body">

      <!-- Loading state — shown while we verify localStorage -->
      <div id="loading-state" class="landing-card" aria-live="polite" aria-busy="true">
        <p class="text-tertiary">Loading...</p>
      </div>

      <!-- New-user state — shown when no verified learner found -->
      <div id="new-user-state" class="landing-card" hidden>
        <h1 class="landing-card__wordmark">Apprendre</h1>
        <p class="landing-card__tagline">Learn French through real conversation — grounded in your everyday life in Louisiana.</p>

        <form class="landing-form" id="onboarding-form" novalidate>
          <div class="landing-form__input-group">
            <label for="learner-name">What's your name?</label>
            <input
              type="text"
              id="learner-name"
              name="name"
              placeholder="Your first name"
              autocomplete="given-name"
              autocapitalize="words"
              spellcheck="false"
              maxlength="80"
              required
            >
          </div>
          <p class="landing-error" id="name-error" hidden aria-live="polite"></p>
          <button type="submit" class="btn btn-primary" id="start-btn">
            Start learning
          </button>
        </form>
      </div>

      <!-- Returning-user state — shown when a verified learner is found -->
      <div id="returning-user-state" class="landing-card" hidden>
        <h1 class="landing-card__wordmark">Apprendre</h1>
        <div class="returning-panel">
          <p class="returning-panel__greeting" id="returning-greeting">Bonjour — welcome back.</p>
          <a href="dashboard.html" class="btn btn-primary">
            Go to your dashboard
          </a>
          <button class="btn btn-ghost btn-sm" id="not-you-btn" type="button">
            Not you?
          </button>
        </div>
      </div>

    </main>

    <footer class="padding-top padding-bottom">
      <div class="units-container">
        <p class="text-center text-tertiary">Apprendre — Learn French for your life in Louisiana</p>
      </div>
    </footer>
  </div>

  <script>
    (function () {
      'use strict';

      var STORAGE_KEY = 'apprendre_learner_id';
      var API_BASE = '/api/learners';

      // ─── State panels ───
      var loadingState = document.getElementById('loading-state');
      var newUserState = document.getElementById('new-user-state');
      var returningState = document.getElementById('returning-user-state');

      // ─── New-user form elements ───
      var onboardingForm = document.getElementById('onboarding-form');
      var nameInput = document.getElementById('learner-name');
      var nameError = document.getElementById('name-error');
      var startBtn = document.getElementById('start-btn');

      // ─── Returning-user elements ───
      var returningGreeting = document.getElementById('returning-greeting');
      var notYouBtn = document.getElementById('not-you-btn');

      // ─── Helpers ───

      function showPanel(panelId) {
        [loadingState, newUserState, returningState].forEach(function (el) {
          el.hidden = el.id !== panelId;
        });
        if (panelId === 'loading-state') {
          loadingState.setAttribute('aria-busy', 'true');
        } else {
          loadingState.setAttribute('aria-busy', 'false');
        }
      }

      function showError(message) {
        nameError.textContent = message;
        nameError.hidden = false;
      }

      function clearError() {
        nameError.textContent = '';
        nameError.hidden = true;
      }

      function setLoading(loading) {
        if (loading) {
          startBtn.setAttribute('data-loading', '');
          startBtn.textContent = 'Starting...';
        } else {
          startBtn.removeAttribute('data-loading');
          startBtn.textContent = 'Start learning';
        }
      }

      // ─── Learner verification ───

      /**
       * Verify a stored learner_id against the API.
       * Returns the learner object if valid, null otherwise.
       */
      function verifyLearner(learnerId) {
        return fetch(API_BASE + '/' + learnerId)
          .then(function (res) {
            if (!res.ok) return null;
            return res.json();
          })
          .catch(function () {
            return null;
          });
      }

      // ─── Initialisation ───

      function init() {
        showPanel('loading-state');

        var stored = localStorage.getItem(STORAGE_KEY);

        if (!stored) {
          showPanel('new-user-state');
          nameInput.focus();
          return;
        }

        var learnerId = parseInt(stored, 10);
        if (isNaN(learnerId)) {
          localStorage.removeItem(STORAGE_KEY);
          showPanel('new-user-state');
          nameInput.focus();
          return;
        }

        verifyLearner(learnerId).then(function (learner) {
          if (!learner) {
            // Stored id no longer valid — clear it and start fresh
            localStorage.removeItem(STORAGE_KEY);
            showPanel('new-user-state');
            nameInput.focus();
            return;
          }

          // Valid returning learner
          var firstName = learner.name ? learner.name.split(' ')[0] : 'you';
          returningGreeting.textContent = 'Bonjour, ' + firstName + ' — welcome back.';
          showPanel('returning-user-state');
        });
      }

      // ─── New-user form submission ───

      onboardingForm.addEventListener('submit', function (e) {
        e.preventDefault();
        clearError();

        var name = nameInput.value.trim();
        if (!name) {
          showError('Please enter your name to get started.');
          nameInput.focus();
          return;
        }

        setLoading(true);

        fetch(API_BASE + '/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name })
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().then(function (data) {
                throw new Error(data.detail || 'Could not create account. Please try again.');
              });
            }
            return res.json();
          })
          .then(function (data) {
            localStorage.setItem(STORAGE_KEY, String(data.id));
            // Redirect to assessment for new users
            window.location.href = 'assessment.html';
          })
          .catch(function (err) {
            setLoading(false);
            showError(err.message || 'Something went wrong. Please try again.');
          });
      });

      // ─── "Not you?" — clear stored identity ───

      notYouBtn.addEventListener('click', function () {
        localStorage.removeItem(STORAGE_KEY);
        showPanel('new-user-state');
        nameInput.value = '';
        clearError();
        nameInput.focus();
      });

      // ─── Kick off ───
      init();

    })();
  </script>
</body>
</html>
