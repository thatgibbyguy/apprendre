<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start a Conversation — Apprendre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js" defer></script>
  <script type="module" src="../js/app.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <header class="sticky" style="top: 0; z-index: 100;">
    <nav class="navbar navbar-borderless" aria-label="Main navigation">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li class="active"><a href="play.html" aria-current="page">Conversations</a></li>
        <li><a href="review.html">Review</a></li>
        <li><a href="#">Carte</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <div class="units-container padding-top padding-bottom-xl">

      <h1 class="h3 margin-bottom">Start a conversation</h1>

      <!-- Learner selector -->
      <section class="margin-bottom-lg">
        <label for="learner-select" class="text-secondary margin-bottom-xs" style="display:block;">Playing as:</label>
        <select id="learner-select" class="input" style="max-width: 20rem;">
          <option value="">Loading learners...</option>
        </select>
      </section>

      <!-- Scenario cards -->
      <section>
        <h2 class="h5 text-secondary margin-bottom-sm">Choose a scenario</h2>
        <div id="scenario-list" class="units-row gap-sm equal-height">
          <p class="text-tertiary">Loading scenarios...</p>
        </div>
      </section>

    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof feather !== 'undefined') feather.replace();

      const learnerSelect = document.getElementById('learner-select');
      const scenarioList = document.getElementById('scenario-list');

      let learners, scenarios;
      try {
        const [learnersRes, scenariosRes] = await Promise.all([
          fetch('/api/learners/'),
          fetch('/api/learners/scenarios'),
        ]);
        const learnersData = await learnersRes.json();
        const scenariosData = await scenariosRes.json();
        learners = learnersData.learners;
        scenarios = scenariosData.scenarios;
      } catch (err) {
        learnerSelect.innerHTML = `<option value="">Error loading: ${err.message}</option>`;
        scenarioList.innerHTML = `<p class="text-tertiary">Error loading scenarios: ${err.message}</p>`;
        console.error('Failed to load data:', err);
        return;
      }

      // Populate learner dropdown
      learnerSelect.innerHTML = '';
      if (learners.length === 0) {
        learnerSelect.innerHTML = '<option value="">No learners found — run: python3 -m server.seed</option>';
        return;
      }
      for (const l of learners) {
        const opt = document.createElement('option');
        opt.value = l.id;
        opt.textContent = `${l.name}  (Speaking: ${l.level_speaking})`;
        learnerSelect.appendChild(opt);
      }

      // Populate scenario cards
      scenarioList.innerHTML = '';
      if (scenarios.length === 0) {
        scenarioList.innerHTML = '<p class="text-tertiary">No scenarios found — run: python3 -m server.content_loader</p>';
        return;
      }

      for (const s of scenarios) {
        const col = document.createElement('div');
        col.className = 'unit-50 tablet-unit-100';

        const card = document.createElement('a');
        card.className = 'action-card no-link-style';
        card.style.cursor = 'pointer';
        card.href = '#';
        card.addEventListener('click', (e) => {
          e.preventDefault();
          const learnerId = learnerSelect.value;
          if (!learnerId) return;
          window.location.href = `conversation.html?scenario_id=${s.id}&learner_id=${learnerId}`;
        });

        card.innerHTML = `
          <div class="action-card__icon" aria-hidden="true">
            <i data-feather="message-circle"></i>
          </div>
          <div class="action-card__content">
            <h3 class="action-card__title text-lg">${s.description}</h3>
            <p class="action-card__subtitle text-sm">Role: ${s.ai_role}</p>
          </div>
          <span class="action-card__arrow">
            <span class="level-badge text-xs level-badge--${s.cefr_level.toLowerCase()}">${s.cefr_level}</span>
          </span>
        `;

        col.appendChild(card);
        scenarioList.appendChild(col);
      }

      if (typeof feather !== 'undefined') feather.replace();
    });
  </script>
</body>
</html>
