<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start a Conversation — Apprendre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js" defer></script>
  <script type="module" src="../js/app.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <header class="sticky" style="top: 0; z-index: 100;">
    <nav class="navbar navbar-borderless" aria-label="Main navigation">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li class="active"><a href="play.html" aria-current="page">Conversations</a></li>
        <li><a href="review.html">Review</a></li>
        <li><a href="#">Carte</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <div class="units-container padding-top padding-bottom-xl">

      <h1 class="h3 margin-bottom">Start a conversation</h1>

      <!-- Learner selector -->
      <section class="margin-bottom-lg">
        <label for="learner-select" class="text-secondary margin-bottom-xs" style="display:block;">Playing as:</label>
        <select id="learner-select" class="input" style="max-width: 20rem;">
          <option value="">Loading learners...</option>
        </select>
      </section>

      <!-- In-progress conversations -->
      <section id="in-progress-section" class="margin-bottom-xl" hidden>
        <h2 class="h5 text-secondary margin-bottom-sm">Continue a conversation</h2>
        <div id="in-progress-list" class="units-row gap-sm equal-height">
          <!-- Inserted by JS -->
        </div>
      </section>

      <!-- Scenario cards -->
      <section>
        <h2 class="h5 text-secondary margin-bottom-sm">Choose a scenario</h2>
        <div id="scenario-list" class="units-row gap-sm equal-height">
          <p class="text-tertiary">Loading scenarios...</p>
        </div>
      </section>

    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof feather !== 'undefined') feather.replace();

      const learnerSelect = document.getElementById('learner-select');
      const scenarioList = document.getElementById('scenario-list');
      const inProgressSection = document.getElementById('in-progress-section');
      const inProgressList = document.getElementById('in-progress-list');

      let learners, scenarios;
      try {
        const [learnersRes, scenariosRes] = await Promise.all([
          fetch('/api/learners/'),
          fetch('/api/learners/scenarios'),
        ]);
        const learnersData = await learnersRes.json();
        const scenariosData = await scenariosRes.json();
        learners = learnersData.learners;
        scenarios = scenariosData.scenarios;
      } catch (err) {
        learnerSelect.innerHTML = `<option value="">Error loading: ${err.message}</option>`;
        scenarioList.innerHTML = `<p class="text-tertiary">Error loading scenarios: ${err.message}</p>`;
        console.error('Failed to load data:', err);
        return;
      }

      // Populate learner dropdown
      learnerSelect.innerHTML = '';
      if (learners.length === 0) {
        learnerSelect.innerHTML = '<option value="">No learners found — run: python3 -m server.seed</option>';
        return;
      }

      // Honour learner_id from query string if present
      const urlParams = new URLSearchParams(window.location.search);
      const defaultLearnerId = urlParams.get('learner_id');

      for (const l of learners) {
        const opt = document.createElement('option');
        opt.value = l.id;
        opt.textContent = `${l.name}  (Speaking: ${l.level_speaking})`;
        if (defaultLearnerId && String(l.id) === String(defaultLearnerId)) {
          opt.selected = true;
        }
        learnerSelect.appendChild(opt);
      }

      // Populate scenario cards
      scenarioList.innerHTML = '';
      if (scenarios.length === 0) {
        scenarioList.innerHTML = '<p class="text-tertiary">No scenarios found — run: python3 -m server.content_loader</p>';
        return;
      }

      for (const s of scenarios) {
        const col = document.createElement('div');
        col.className = 'unit-50 tablet-unit-100';

        const card = document.createElement('a');
        card.className = 'action-card no-link-style';
        card.style.cursor = 'pointer';
        card.href = '#';
        card.addEventListener('click', (e) => {
          e.preventDefault();
          const learnerId = learnerSelect.value;
          if (!learnerId) return;
          window.location.href = `conversation.html?scenario_id=${s.id}&learner_id=${learnerId}`;
        });

        card.innerHTML = `
          <div class="action-card__icon" aria-hidden="true">
            <i data-feather="message-circle"></i>
          </div>
          <div class="action-card__content">
            <h3 class="action-card__title text-lg">${s.description}</h3>
            <p class="action-card__subtitle text-sm">Role: ${s.ai_role}</p>
          </div>
          <span class="action-card__arrow">
            <span class="level-badge text-xs level-badge--${s.cefr_level.toLowerCase()}">${s.cefr_level}</span>
          </span>
        `;

        col.appendChild(card);
        scenarioList.appendChild(col);
      }

      if (typeof feather !== 'undefined') feather.replace();

      // Load in-progress conversations for the selected learner
      async function loadInProgress(learnerId) {
        inProgressSection.hidden = true;
        inProgressList.innerHTML = '';

        if (!learnerId) return;

        let conversations;
        try {
          const res = await fetch(`/api/conversation/?learner_id=${learnerId}`);
          if (!res.ok) return;
          const data = await res.json();
          conversations = data.conversations || [];
        } catch (err) {
          console.warn('Could not load in-progress conversations:', err);
          return;
        }

        // Filter to sessions that haven't ended yet
        const active = conversations.filter(c => !c.ended_at);
        if (active.length === 0) return;

        for (const session of active) {
          const col = document.createElement('div');
          col.className = 'unit-50 tablet-unit-100';

          // Format the started_at timestamp
          let timeAgo = '';
          if (session.started_at) {
            try {
              const started = new Date(session.started_at);
              const diffMs = Date.now() - started.getTime();
              const diffMins = Math.floor(diffMs / 60000);
              if (diffMins < 1) {
                timeAgo = 'just now';
              } else if (diffMins < 60) {
                timeAgo = `${diffMins}m ago`;
              } else {
                const diffHours = Math.floor(diffMins / 60);
                if (diffHours < 24) {
                  timeAgo = `${diffHours}h ago`;
                } else {
                  const diffDays = Math.floor(diffHours / 24);
                  timeAgo = `${diffDays}d ago`;
                }
              }
            } catch (e) { /* ignore */ }
          }

          const scenarioLabel = session.scenario || 'Conversation';

          const card = document.createElement('a');
          card.className = 'action-card in-progress-card no-link-style';
          card.href = `conversation.html?session_id=${session.id}&learner_id=${learnerId}`;

          card.innerHTML = `
            <div class="action-card__icon action-card__icon--resume" aria-hidden="true">
              <i data-feather="play-circle"></i>
            </div>
            <div class="action-card__content">
              <h3 class="action-card__title">${escapeHtml(scenarioLabel)}</h3>
              <p class="action-card__subtitle text-sm">Started ${timeAgo}</p>
            </div>
            <span class="action-card__arrow in-progress-card__resume text-sm">
              Resume <i data-feather="arrow-right"></i>
            </span>
          `;

          col.appendChild(card);
          inProgressList.appendChild(col);
        }

        inProgressSection.hidden = false;
        if (typeof feather !== 'undefined') feather.replace();
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // Initial load
      loadInProgress(learnerSelect.value);

      // Reload when learner changes
      learnerSelect.addEventListener('change', () => {
        loadInProgress(learnerSelect.value);
      });
    });
  </script>
</body>
</html>
